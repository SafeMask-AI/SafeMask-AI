<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>로그인 - 해태 SafeMask</title>
	<link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body class="login-page">
<main class="login-shell" aria-label="SafeMask 로그인">
	<section class="login-form-panel" aria-labelledby="loginTitle">
		<div class="login-form-inner">
			<div class="login-logo-block">
				<img th:src="@{/images/login-haetae-logo.jpg}" alt="해태" class="login-logo">
				<div>
					<h1 id="loginTitle" class="login-title">SafeMask 로그인</h1>
					<p class="login-subtitle">사번과 비밀번호로 로그인하세요</p>
				</div>
			</div>

			<form id="loginForm" class="login-form" novalidate>
				<div class="login-field">
					<label for="loginId">사번</label>
					<div class="login-input-wrap">
						<span class="login-input-icon" aria-hidden="true">
							<svg width="17" height="17" viewBox="0 0 24 24" fill="none">
								<rect x="3" y="4" width="18" height="16" rx="3"></rect>
								<circle cx="9" cy="11" r="2.2"></circle>
								<path d="M5.5 17c.8-1.8 2-2.6 3.5-2.6s2.7.8 3.5 2.6"></path>
								<line x1="15" y1="9" x2="18.5" y2="9"></line>
								<line x1="15" y1="13" x2="18.5" y2="13"></line>
							</svg>
						</span>
						<input type="text" id="loginId" name="loginId" placeholder="예) 2026001"
							autocomplete="username" required>
					</div>
				</div>

				<div class="login-field">
					<label for="password">비밀번호</label>
					<div class="login-input-wrap">
						<span class="login-input-icon" aria-hidden="true">
							<svg width="17" height="17" viewBox="0 0 24 24" fill="none">
								<rect x="4" y="10" width="16" height="10" rx="3"></rect>
								<path d="M8 10V7.5a4 4 0 0 1 8 0V10"></path>
								<circle cx="12" cy="15" r="1.6" fill="currentColor" stroke="none"></circle>
							</svg>
						</span>
						<input type="password" id="password" name="password" placeholder="비밀번호 입력"
							autocomplete="current-password" required>
						<button type="button" id="togglePassword" class="login-password-toggle"
							aria-label="비밀번호 표시" aria-pressed="false">
							<svg class="icon-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
								<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
								<circle cx="12" cy="12" r="3"></circle>
							</svg>
							<svg class="icon-eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
								<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
								<line x1="1" y1="1" x2="23" y2="23"></line>
							</svg>
						</button>
					</div>
				</div>

				<div class="login-options">
					<label class="login-remember">
						<input type="checkbox" id="rememberLogin">
						<span>로그인 상태 유지</span>
					</label>
				</div>

				<p id="loginMessage" class="form-message error login-message"></p>

				<button type="submit" id="loginButton" class="login-submit">로그인</button>
			</form>

			<p class="login-signup-link">
				아직 계정이 없으신가요?
				<a th:href="@{/signup}">회원가입</a>
			</p>

			<div class="login-help">
				<span class="login-help-icon" aria-hidden="true">i</span>
				<p>계정 문의는 IT 개발팀으로 문의해 주세요.</p>
			</div>
		</div>
	</section>

	<section class="login-visual-panel" aria-label="SafeMask 소개">
		<img th:src="@{/images/login-sweet-world.png}" alt="해태 스위트 월드" class="login-visual-image">
		<div class="login-visual-scrim" aria-hidden="true"></div>

		<div class="login-hero-copy">
			<div class="login-brand-pill">
				<span aria-hidden="true">
					<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
						<path d="M12 2l8 3v6c0 5-3.4 9.3-8 11-4.6-1.7-8-6-8-11V5l8-3z"></path>
						<path d="M9.2 12.2l2 2 3.8-4" fill="none" stroke="#fff" stroke-width="2"
							stroke-linecap="round" stroke-linejoin="round"></path>
					</svg>
				</span>
				해태제과 · SafeMask
			</div>

			<div>
				<h2><span>해태인의 AI 동료,</span><br>SafeMask</h2>
				<p>개인정보를 안전하게 보호하는 AI 마스킹 시스템</p>
			</div>

			<div class="login-feature-card" aria-label="주요 기능">
				<div class="login-feature-item">
					<svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
						<path d="M12 2l8 3v6c0 5-3.4 9.3-8 11-4.6-1.7-8-6-8-11V5l8-3z"></path>
						<path d="M9.2 12.2l2 2 3.8-4"></path>
					</svg>
					<span>안전한 마스킹</span>
				</div>
				<div class="login-feature-separator"></div>
				<div class="login-feature-item">
					<svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
						<rect x="4" y="10" width="16" height="10" rx="3"></rect>
						<path d="M8 10V7.5a4 4 0 0 1 8 0V10"></path>
					</svg>
					<span>데이터 보호</span>
				</div>
				<div class="login-feature-separator"></div>
				<div class="login-feature-item">
					<svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
						<rect x="6" y="6" width="12" height="12" rx="2.5"></rect>
						<line x1="12" y1="2" x2="12" y2="6"></line>
						<line x1="12" y1="18" x2="12" y2="22"></line>
						<line x1="2" y1="12" x2="6" y2="12"></line>
						<line x1="18" y1="12" x2="22" y2="12"></line>
						<text x="12" y="14.8" text-anchor="middle" font-size="7" font-weight="800"
							fill="currentColor" stroke="none">AI</text>
					</svg>
					<span>AI 기반 처리</span>
				</div>
			</div>
		</div>

		<footer class="login-visual-footer">
			<span>&copy; 2026 HAETAE Confectionery &amp; Foods</span>
			<span class="login-footer-dot" aria-hidden="true"></span>
			<span>사내 전용 시스템</span>
		</footer>
	</section>
</main>

<script th:src="@{/js/login.js}"></script>
</body>
</html>
