<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>회원가입 - 해태 SafeMask</title>
	<link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body class="login-page signup-page">
<main class="login-shell signup-shell" aria-label="SafeMask 회원가입">
	<section class="signup-card" aria-labelledby="signupTitle">
		<th:block th:replace="~{auth/fragments/signup-card :: signupCard}"></th:block>
	</section>

	<section class="login-visual-panel signup-visual-panel" aria-hidden="true">
		<img th:src="@{/images/login-sweet-world.png}" alt="" class="login-visual-image">
		<footer class="login-visual-footer">
			<span>&copy; 2026 HAETAE Confectionery</span>
			<span class="login-footer-dot" aria-hidden="true"></span>
			<span>사내 전용 시스템</span>
		</footer>
	</section>
</main>

<script th:src="@{/js/signup.js}"></script>
</body>
</html>
