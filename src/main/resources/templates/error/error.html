<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>SafeMask Error</title>
	<style>
		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #f6f8fb;
			color: #1f2937;
			font-family: Arial, "Noto Sans KR", sans-serif;
		}

		main {
			width: min(520px, calc(100% - 32px));
			padding: 32px;
			border: 1px solid #e5e7eb;
			border-radius: 8px;
			background: #ffffff;
			box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
		}

		.status {
			margin: 0 0 12px;
			color: #2563eb;
			font-size: 14px;
			font-weight: 700;
		}

		h1 {
			margin: 0 0 12px;
			font-size: 24px;
			line-height: 1.35;
		}

		p {
			margin: 0;
			color: #4b5563;
			line-height: 1.6;
		}

		.path {
			margin-top: 20px;
			padding-top: 16px;
			border-top: 1px solid #e5e7eb;
			color: #6b7280;
			font-size: 13px;
			word-break: break-all;
		}
	</style>
</head>
<body>
<main>
	<p class="status" th:text="${status} + ' / ' + ${code}">500 / COMMON_500</p>
	<h1>요청을 처리하지 못했습니다.</h1>
	<p th:text="${message}">서버 내부 오류가 발생했습니다.</p>
	<p class="path" th:if="${path}" th:text="${path}">/request-path</p>
</main>
</body>
</html>
