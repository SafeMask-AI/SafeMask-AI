<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>페이지를 찾을 수 없습니다 | SafeMask</title>
	<link rel="icon" type="image/jpeg" th:href="@{/images/haitai-logo.jpg}">
	<script th:src="@{/js/theme.js}"></script>
	<style>
		:root{--pink:#ed1e79;--pink-dark:#c4136b;--text:#2c2227;--muted:#88757f;--border:#f0dce5;--surface:#fff;--background:#fff8fc}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 50% 18%,#fff 0,#fff8fc 48%,#fbedf4 100%);color:var(--text);font-family:Pretendard,"Noto Sans KR","Malgun Gothic",sans-serif}.error-card{width:min(620px,100%);padding:46px clamp(26px,7vw,58px);border:1px solid var(--border);border-radius:28px;background:var(--surface);text-align:center;box-shadow:0 24px 80px #5c2e4517}.brand{display:inline-flex;align-items:center;gap:10px;color:inherit;text-decoration:none}.brand img{width:76px;height:42px;padding:6px 9px;border:1px solid var(--border);border-radius:12px;background:#fff;object-fit:contain;object-position:center}.brand span{display:grid;text-align:left}.brand small{color:#aa7890;font-size:8px;font-weight:900;letter-spacing:.13em}.brand strong{font-size:19px}.status{margin:34px 0 8px;color:var(--pink);font-size:64px;font-weight:950;letter-spacing:-.06em;line-height:1}.eyebrow{margin:0 0 9px;color:var(--pink-dark);font-size:11px;font-weight:900;letter-spacing:.14em}h1{margin:0;font-size:clamp(25px,5vw,34px);letter-spacing:-.045em}.description{margin:14px auto 0;max-width:430px;color:var(--muted);font-size:14px;line-height:1.7}.path{margin:19px 0 0;padding:11px 14px;border-radius:11px;background:#fff4f9;color:#9b7487;font-size:12px;word-break:break-all}.actions{display:flex;justify-content:center;gap:10px;margin-top:30px}.actions a{min-width:140px;padding:12px 17px;border-radius:12px;font-size:13px;font-weight:850;text-decoration:none}.primary{background:var(--pink);color:#fff}.secondary{border:1px solid var(--border);color:var(--pink-dark)}html[data-theme='dark']{--text:#ece4e9;--muted:#b3a6ad;--border:#4a3a44;--surface:#2b242a;--background:#1d191d;color-scheme:dark}html[data-theme='dark'] body{background:radial-gradient(circle at 50% 18%,#332a32 0,#1d191d 55%,#171317 100%)}html[data-theme='dark'] .error-card{box-shadow:0 24px 80px #0008}html[data-theme='dark'] .brand img{border-color:#513f4a;background:linear-gradient(145deg,#3b3038,#30272f)}html[data-theme='dark'] .path{background:#382d35;color:#bda8b3}html[data-theme='dark'] .secondary{color:#ff74b2}@media(max-width:520px){.error-card{padding:36px 22px}.actions{display:grid}.actions a{min-width:0}}
	</style>
</head>
<body>
<main class="error-card">
	<a class="brand" href="/" aria-label="SafeMask 홈">
		<img th:src="@{/images/haitai-logo-transparent.png}" alt="해태">
		<span><small>HAITAI SECURE AI</small><strong>SafeMask</strong></span>
	</a>
	<p class="status" aria-label="오류 코드 404">404</p>
	<p class="eyebrow">PAGE NOT FOUND</p>
	<h1>페이지를 찾을 수 없습니다.</h1>
	<p class="description">주소가 잘못 입력되었거나 페이지가 이동되었습니다. 안전한 화면으로 돌아가 다시 이용해 주세요.</p>
	<p class="path" th:if="${path}" th:text="${path}">/unknown-path</p>
	<div class="actions">
		<a class="primary" href="/chat">채팅으로 돌아가기</a>
		<a class="secondary" href="/login">로그인 화면</a>
	</div>
</main>
</body>
</html>
