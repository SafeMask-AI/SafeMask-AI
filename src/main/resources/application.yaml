spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: safemask

  # DB 설정은 .env에서 주입합니다.
  # - 회사/운영 환경: Oracle 값을 활성화하세요.
  # - 개인/로컬 개발 환경: MySQL 값을 활성화하세요.
  datasource:
    driver-class-name: ${DB_DRIVER_CLASS_NAME:oracle.jdbc.OracleDriver}
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        # 주의: dialect를 버전 없이 고정하면 Hibernate가 DB 버전 감지를 건너뛰고
        # 최신 문법(FETCH FIRST 등)을 생성해, 구버전 Oracle에서 ORA-00933이 납니다.
        # 이 때문에 리포지토리에서는 findFirst/findTop 같은 LIMIT 파생 쿼리를 쓰지 않는 것이
        # 프로젝트 규칙입니다. (FileAssetRepository 주석 참고)
        dialect: ${JPA_DATABASE_PLATFORM:org.hibernate.dialect.OracleDialect}
        format_sql: ${JPA_FORMAT_SQL:false}
    show-sql: ${JPA_SHOW_SQL:false}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  ai:
    openai:
      # OpenAiResponsesGateway가 직접 읽으며, 값은 운영 환경 변수에서만 주입합니다.
      api-key: ${OPENAI_API_KEY:}

  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:20MB}
      max-request-size: ${MAX_REQUEST_SIZE:25MB}

server:
  port: ${SERVER_PORT:8080}

# 마스킹 관련 정책 설정입니다.
# mapping-ttl: 원본값↔토큰 매핑을 Redis에 보관하는 시간.
#   방에서 마스킹/원복 활동이 있을 때마다 갱신되며, 만료되면 해당 방의
#   기존 토큰은 원복할 수 없게 됩니다. (원본 민감정보 최소보관 정책)
# storage.base-path: 업로드·AI 생성 파일이 저장되는 사내 스토리지 경로.
#   생성 파일에는 원복된 민감정보가 들어가므로 웹에서 직접 접근할 수 없는
#   경로여야 하며, 다운로드는 인증된 API를 통해서만 이뤄집니다.
#   기본값은 프로젝트 내부가 아니라 OS 임시 디렉터리입니다. 운영 환경은
#   FILE_STORAGE_PATH로 프로젝트 밖의 전용 보안 저장소를 지정하세요.
safemask:
  # Refresh Token은 HttpOnly·SameSite=Strict를 유지하고, Secure 속성만 환경별로 분리합니다.
  # prod 프로필은 application-prod.yaml에서 기본 true이며 false로 내리면 기동 검증이 실패합니다.
  auth:
    cookie:
      secure: ${AUTH_COOKIE_SECURE:false}
    protection:
      enabled: ${AUTH_REQUEST_PROTECTION_ENABLED:true}
      login-limit: ${AUTH_LOGIN_RATE_LIMIT:10}
      login-window: ${AUTH_LOGIN_RATE_WINDOW:5m}
      signup-limit: ${AUTH_SIGNUP_RATE_LIMIT:5}
      signup-window: ${AUTH_SIGNUP_RATE_WINDOW:1h}
      duplicate-check-limit: ${AUTH_DUPLICATE_RATE_LIMIT:30}
      duplicate-check-window: ${AUTH_DUPLICATE_RATE_WINDOW:1m}
      refresh-limit: ${AUTH_REFRESH_RATE_LIMIT:30}
      refresh-window: ${AUTH_REFRESH_RATE_WINDOW:5m}
  admin:
    # 최초 설치에서 관리자 계정이 하나도 없을 때만 기존 회원 사번을 ADMIN/APPROVED로 승격합니다.
    # 첫 관리자 생성 후에는 환경변수를 제거하세요. 기존 관리자가 있으면 이 값은 무시됩니다.
    bootstrap-login-id: ${SAFEMASK_BOOTSTRAP_ADMIN_LOGIN_ID:}
  ai:
    model: ${SAFEMASK_AI_MODEL:gpt-5.5}
    # Responses API의 hosted web_search를 사용합니다. 요청에는 store=false를 명시해
    # 공급자 측 응답 저장을 끄고, 서버에서 마스킹된 메시지만 전송합니다.
    responses-url: ${OPENAI_RESPONSES_URL:https://api.openai.com/v1/responses}
    request-timeout: ${OPENAI_REQUEST_TIMEOUT:180s}
    # AI 요청은 연결이 끊겨도 서버에서 마무리하므로 API 타임아웃보다 여유 있게 둡니다.
    sse-timeout: ${AI_SSE_TIMEOUT:210s}
  attachment:
    # 압축된 Office 파일은 바이트 크기보다 훨씬 많은 텍스트가 나올 수 있어 추출 결과도 제한합니다.
    # 한도 초과 내용을 잘라 AI에 보내면 민감정보·업무 행이 누락될 수 있으므로 요청 전체를 거절합니다.
    max-extracted-chars-per-file: ${ATTACHMENT_MAX_CHARS_PER_FILE:120000}
    max-extracted-chars-per-request: ${ATTACHMENT_MAX_CHARS_PER_REQUEST:180000}
    max-excel-cells: ${ATTACHMENT_MAX_EXCEL_CELLS:200000}
    max-pdf-pages: ${ATTACHMENT_MAX_PDF_PAGES:300}
  masking:
    mapping-ttl: ${MASKING_MAPPING_TTL:24h}
    # 미리보기 승인 ID와 승인 스냅샷의 유효시간. 만료되면 다시 검사해야 합니다.
    approval-ttl: ${MASKING_APPROVAL_TTL:15m}
    # 취소 요청 없이 닫힌 브라우저의 만료 빈 채팅방·Redis 매핑 정리 주기.
    preview-cleanup-interval: ${MASKING_PREVIEW_CLEANUP_INTERVAL:5m}
  storage:
    base-path: ${FILE_STORAGE_PATH:${java.io.tmpdir}/safemask/files}
  pdf:
    # PDF 결과에 한글을 쓸 때 포함할 TTF/OTF 글꼴입니다. 운영 서버에서는
    # 웹 정적 경로가 아닌 서버 내부 글꼴 파일을 PDF_FONT_PATH로 지정해야 합니다.
    font-path: ${PDF_FONT_PATH:}

# JWT 토큰 발급/검증에 사용하는 설정입니다.
# secret은 HS256 서명 키로 사용되므로 최소 32바이트(256비트) 이상의 문자열이어야 하며,
# 실제 값은 .env 파일에서 주입합니다. (JwtProperties에서 바인딩)
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}      # Access Token 만료(ms), 기본 1시간
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:1209600000} # Refresh Token 만료(ms), 기본 14일
